apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n

spec:
  replicas: 1

  selector:
    matchLabels:
      app: n8n

  template:
    metadata:
      labels:
        app: n8n

    spec:
      containers:

      - name: n8n

        image: n8nio/n8n:latest

        ports:
        - containerPort: 5678

        env:
        - name: N8N_HOST
          value: localhost

        - name: N8N_PORT
          value: "5678"

        - name: N8N_PROTOCOL
          value: http

        - name: GENERIC_TIMEZONE
          value: America/Lima

---
apiVersion: v1
kind: Service
metadata:
  name: n8n-service

spec:
  selector:
    app: n8n

  ports:
  - port: 5678
    targetPort: 5678

  type: NodePort