version: "3.9"

services:
  # ── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: toyota_sqlserver
    environment:
      SA_PASSWORD: "Toyota@2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Toyota@2026!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10
      timeout: 5s

  # ── RabbitMQ (Message Broker) ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: toyota_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5

  # ── WebAPI REST ─────────────────────────────────────────────────────────────
  webapi:
    build:
      context: .
      dockerfile: src/Services.WebApi/Dockerfile
    container_name: toyota_webapi
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ConcesionariaAutosToyota;User Id=sa;Password=Toyota@2026!;TrustServerCertificate=True;"
      JwtSettings__SecretKey: "mi-clave-secreta-super-segura-toyota-2026-256bits!!"
      JwtSettings__Issuer: "ConcesionariaAutosToyota"
      JwtSettings__Audience: "ConcesionariaClients"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__User: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── gRPC Service ────────────────────────────────────────────────────────────
  grpcservice:
    build:
      context: .
      dockerfile: src/Services.gRPC/Dockerfile
    container_name: toyota_grpc
    ports:
      - "5001:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ConcesionariaAutosToyota;User Id=sa;Password=Toyota@2026!;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data: